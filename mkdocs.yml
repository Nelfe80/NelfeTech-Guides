site_name: NelfeTech — Guides
site_description: Guides pas à pas par profil — joueurs, streamers, salles d'arcade, organisateurs de tournois, assembleurs de bornes.
site_url: https://nelfe80.github.io/NelfeTech-Guides/
repo_url: https://github.com/Nelfe80/NelfeTech-Guides
repo_name: Nelfe80/NelfeTech-Guides
docs_dir: wiki
edit_uri: ""

theme:
  name: material
  language: fr
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Mode clair
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: fr
          default: true
          name: Français
          build: true
        - locale: en
          name: English
          build: true
          site_name: NelfeTech — Guides
          nav_translations:
            Accueil: Home
            Joueur en salle: Player in a venue
            Joueur en ligne / à domicile: Player online / at home
            Streamer: Streamer
            Gestionnaire de salle: Venue manager
            Organisateur de tournois: Tournament organizer
            Assembleur de bornes: Cabinet builder

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Accueil: index.md
  - Joueur en salle: joueur-salle.md
  - Joueur en ligne / à domicile: joueur-en-ligne.md
  - Streamer: streamer.md
  - Gestionnaire de salle: gestionnaire.md
  - Organisateur de tournois: organisateur.md
  - Assembleur de bornes: assembleur.md
